services:
  mongodb:
    image: mongo:7
    container_name: flashcard-platform-mongodb
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-flashcard_platform}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb-data:
