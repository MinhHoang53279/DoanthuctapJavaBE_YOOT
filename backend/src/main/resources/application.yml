spring:
  application:
    name: flashcard-platform
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/flashcard_platform}
      auto-index-creation: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  security:
    jwt:
      secret: ${JWT_SECRET:}
      access-token-expiration-ms: ${ACCESS_TOKEN_EXPIRATION_MS:3600000}
      refresh-token-expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:604800000}
